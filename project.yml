name: Keel
options:
  bundleIdPrefix: com.keel
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  Keel:
    type: application
    platform: iOS
    sources:
      - Keel
    settings:
      base:
        INFOPLIST_FILE: Keel/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.keel.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Keel"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Keel reads your body weight from Apple Health to display alongside your training data."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Keel saves workout summaries to Apple Health when you complete a training session."
    entitlements:
      path: Keel/Keel.entitlements
      properties:
        com.apple.developer.healthkit: true
